# Externalized scoring config: keyword regex patterns, category weights, and
# caps for the keyword-based scorers. Editing these tunes/generalizes scoring
# without touching code. Patterns use TOML *literal* strings (single quotes) so
# regex backslashes need no escaping. Loaded by scoring/_keyword_config.py.

[risk]
category_cap = 15
total_cap = 100

[risk.weights]
macroeconomic = 1.0
supply_chain = 1.2
geopolitical = 1.4
regulatory_legal = 1.1
cybersecurity = 1.0
concentration = 1.2

[risk.keywords]
macroeconomic = ['\binflation\b', 'interest rates', '\brecession\b', 'currency fluctuations', 'foreign exchange', 'exchange rates', 'economic conditions', 'consumer confidence', '\bspending\b', '\bmacroeconomic\b', 'cyclical demand', 'pricing pressure', 'adverse market conditions']
supply_chain = ['supply chain', '\bsupplier\b', '\bsuppliers\b', '\bmanufacturing\b', '\bassembly\b', 'component shortages', '\blogistics\b', '\bdisruption\b', '\bshortages\b', 'lead times', 'capacity constraints', 'raw materials', 'production interruption', 'single source supplier']
geopolitical = ['\bgeopolitical\b', '\btariffs\b', 'trade restrictions', 'trade tensions', '\bsanctions\b', 'export controls', '\bchina\b', '\bchinese\b', '\btaiwan\b', '\bwar\b', 'armed conflict', 'international operations', 'cross-border operations', 'regional economic conditions', 'national security', 'customs duties']
regulatory_legal = ['\bregulation\b', '\bregulatory\b', '\blitigation\b', '\blawsuit\b', '\bcompliance\b', '\bantitrust\b', '\bgovernment\b', 'legal proceedings', 'licensing restrictions', 'export license', 'data protection', 'environmental regulation', '\btax law\b']
cybersecurity = ['\bcybersecurity\b', 'cyber attack', 'cyber attacks', 'data breach', '\bprivacy\b', 'security incident', 'unauthorized access', 'information security', '\bransomware\b', 'network intrusion']
concentration = ['single source', '\bconcentration\b', 'depend significantly', 'majority of', 'customer concentration', 'supplier concentration', 'depend on', 'limited number of customers', '\bkey customer\b', '\btop customer\b', 'significant customer']

[moat]
category_cap = 15
total_cap = 100
base_score = 35

[moat.weights]
brand_strength = 1.4
switching_costs = 1.5
ecosystem_lock_in = 1.2
scale_advantages = 1.4
distribution_advantages = 1.1
intellectual_property = 1.6
customer_dependency_lock_in = 1.5
technology_leadership = 1.6

[moat.keywords]
brand_strength = ['\bbrand\b', 'customer loyalty', '\breputation\b', '\btrusted\b', '\bpremium\b', 'market leader', 'technology leader', 'industry leader']
switching_costs = ['\bintegrated\b', '\bcompatibility\b', '\binstalled base\b', '\bcontinuity\b', 'qualification', 'qualified', 'process integration', '\bworkflow\b', 'service agreement', 'field service', '\bupgrade\b', 'productivity upgrade', 'customer roadmap', 'process node', 'co-development']
ecosystem_lock_in = ['\becosystem\b', '\bservices\b', '\bintegrated\b', 'supplier ecosystem', 'service network', 'global service network', 'customer support', 'application support', 'installed base management']
scale_advantages = ['\bglobal\b', '\bscale\b', '\bworldwide\b', '\binternational\b', 'supply chain', 'large and complex', 'installed base', 'barriers to entry', 'high barriers to entry', 'capital intensive', 'engineering complexity', 'long development cycle', 'manufacturing precision', '\blead time\b']
distribution_advantages = ['direct sales', '\bdistribution\b', '\bchannel\b', 'global sales', 'customer relationships', 'long-term customer', 'strategic customer', 'service organization']
intellectual_property = ['intellectual property', '\bpatent\b', '\bpatents\b', '\bproprietary\b', '\btrademark\b', '\bcopyright\b', 'patent portfolio', 'trade secret', 'know-how', 'licensed technology', 'process technology', 'proprietary process', 'photolithography', '\beuv\b', 'extreme ultraviolet', 'high-na']
customer_dependency_lock_in = ['sole supplier', 'single supplier', 'critical equipment', 'mission critical', '\byield\b', '\bthroughput\b', '\buptime\b', 'qualification cycle', '\bvalidated\b', 'replacement cycle']
technology_leadership = ['technology leadership', 'technology leader', 'process roadmap', 'next-generation', 'advanced node', '\br&d\b', 'research and development', '\binnovation\b', 'roadmap', 'development program']

[business_model]
positive_cap = 15
negative_cap = 12
total_cap = 100
base_score = 50

[business_model.positive_weights]
recurring_revenue = 1.4
diversification = 1.2
scalability = 1.3
ecosystem_strength = 1.5

[business_model.negative_weights]
operational_intensity = 1.0
customer_dependency = 1.2

[business_model.keywords]
recurring_revenue = ['\bsubscription\b', '\bsubscriptions\b', '\bservices\b', '\bservice\b', '\blicensing\b', '\blicense\b', '\bmaintenance\b', '\bsupport\b', '\bcloud\b', 'fee-based', '\brecurring\b', 'service agreement', 'long-term service', '\bupgrade\b', 'aftermarket', 'spare parts', 'installed base', 'consumables']
diversification = ['\bproducts\b', '\bservices\b', '\bsegments\b', '\bgeographic\b', '\binternational\b', '\bportfolio\b', '\bmultiple\b', '\bvariety\b', 'line includes', '\bofferings\b', 'end markets', '\bapplications\b', 'product portfolio', 'customer base', '\bregions\b']
scalability = ['\bplatform\b', '\bsoftware\b', '\bdigital\b', '\becosystem\b', '\bonline\b', '\bcloud\b', '\bintegrated\b', '\bservices\b', '\bmodular\b', '\bstandardized\b', '\bautomation\b', 'productivity', 'global service network', 'service network', 'installed base']
ecosystem_strength = ['\becosystem\b', '\bintegrated\b', 'installed base', '\bcompatibility\b', 'customer loyalty', '\bbrand\b', 'customer collaboration', 'application support', 'supplier network', 'service network', '\bworkflow\b', '\bqualification\b']
operational_intensity = ['\bmanufacturing\b', '\bassembly\b', '\bsupplier\b', '\bsuppliers\b', '\blogistics\b', '\binventory\b', '\bcomponent\b', '\bdistribution\b', 'capital intensive', '\bfacility\b', '\bfacilities\b', 'production capacity', 'service organization']
customer_dependency = ['depend on', 'depend significantly', 'single source', '\bconcentration\b', '\bchannel\b', '\breseller\b', 'third-party', 'limited number of customers', '\bkey customer\b', '\btop customer\b', 'customer concentration', 'supplier concentration', 'sole supplier']
