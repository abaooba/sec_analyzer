name: CI

# Runs lint (ruff), type-check (mypy), and the test suite on every push and PR.
# All three are scoped to the core library (backend/app) and fully offline
# (SEC/Groq are monkeypatched; the DB is in-memory), so no secrets are needed.
on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check backend/app

      - name: Type-check (mypy)
        run: mypy backend/app

      - name: Run tests
        run: pytest
