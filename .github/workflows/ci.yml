name: CI

# Runs the test suite on every push and pull request. The tests are fully
# offline (SEC/Groq are monkeypatched; the DB is in-memory), so no secrets are
# needed. ruff + mypy gates are added once backend/app passes them cleanly
# (see LEARNINGS.md — T1: ruff + mypy config + type-hint backfill).
on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests
        run: pytest
